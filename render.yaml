# render.yaml — Infrastructure-as-Code for Render.com

services:
  - type: web
    name: pa-validation-api
    runtime: python
    region: oregon
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /api/health

    envVars:
      - key: API_HOST
        value: 0.0.0.0
      - key: API_DEBUG
        value: "false"
      - key: API_PORT
        value: "8000"
      - key: DB_POOL_SIZE
        value: "3"
      - key: DB_MAX_OVERFLOW
        value: "2"
      - key: DB_POOL_TIMEOUT
        value: "30"

databases:
  - name: pa-validation-db
    databaseName: validation_db
    user: inara
    plan: free
    region: oregon